name: Keep GeneLens Alive

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping GeneLens to prevent sleep
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://genelens.streamlit.app/ || true
          echo "Ping sent to genelens.streamlit.app"
